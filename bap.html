<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>tokentoko.indomaret.co.id</title>

<script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>

<style>
body{
    margin:0;
    font-family:Arial,sans-serif;
    background:#0d2346;
}

.container{
    width:600px;
    margin:40px auto;
}

select,input{
    width:100%;
    padding:10px;
    margin-bottom:15px;
    font-size:18px;
}

.btn{
    width:100%;
    padding:12px;
    font-size:18px;
    cursor:pointer;
    margin-bottom:10px;
}

.otp-box{
    background:white;
    border:1px solid #999;
    padding:10px;
    font-size:18px;
    margin-bottom:15px;
    word-break:break-all;
}

#qrcode{
    background:white;
    padding:15px;
    width:max-content;
    margin:auto;
    margin-bottom:15px;
}
</style>
</head>
<body>

    <img src="images.png">

<div class="container">

    <select>
        <option>BAP BKL</option>
         <option>TAT Antar Toko</option>
           <option>BA STICKER</option>
    </select>

    <select id="kode toko">
        <option>TMF8</option>
        <option>TL7F</option>
        <option>TOES</option>
        <option>TV0R</option>
        <option>FDCA</option>
        <option>TSID</option>
        <option>T9E1</option>
        <option>TUYW</option>
        <option>TN4G</option>
        <option>TWJ5</option>
        <option>FUQR</option>
    </select>
    <input type="email" id="email">
    <select id="kodeToko" onchange="updateEmail()"></select>

    <input type="date" id="tanggal">

    <input type="email" value="idmtmf8@smd.indomaret.co.id">

    <button class="btn" onclick="generateOTP()">Generate</button>

    <div class="otp-box" id="otpBox">
        Belum ada OTP
    </div>

    <div id="qrcode"></div>

    <button class="btn" onclick="downloadQR()">
        Download QR OTP
    </button>

</div>

<script>

    function updateEmail() {
    const kode = document.getElementById("kodeToko").value;

    document.getElementById("email").value =
        `idm${kode.toLowerCase()}@smd.indomaret.co.id`;
}

// otomatis saat halaman dibuka
updateEmail();

function randomOTP(length = 32){
    const chars =
    "ABCDEFGHIJKLMNOPQRSTUVWXYZabcdefghijklmnopqrstuvwxyz0123456789+/";

    let result = "";

    for(let i=0;i<length;i++){
        result += chars.charAt(
            Math.floor(Math.random()*chars.length)
        );
    }

    return result + "==";
}

function generateOTP(){

    const otp = randomOTP();

    document.getElementById("otpBox").innerText = otp;

    document.getElementById("qrcode").innerHTML = "";

    new QRCode(document.getElementById("qrcode"),{
        text: otp,
        width: 256,
        height: 256
    });
}

function downloadQR(){

    const canvas = document.querySelector("#qrcode canvas");

    if(!canvas){
        alert("Generate OTP dulu");
        return;
    }

    const link = document.createElement("a");

    link.download =
        "QR_OTP_" + Date.now() + ".png";

    link.href = canvas.toDataURL();

    link.click();
}
</script>

</body>
</html>
